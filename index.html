
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>macOS Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        accent: 'var(--accent)',
                        main: 'var(--text-main)',
                        secondary: 'var(--text-secondary)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Light Mode */
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-secondary: #475569;
            --accent: #0284c7;
            --blur: 40px;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            
            --menu-bg: rgba(255, 255, 255, 0.6);
            --menu-border: rgba(0, 0, 0, 0.05);

            --window-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            --window-shadow-active: 0 30px 80px rgba(0, 0, 0, 0.1);
        }

        [data-theme='dark'] {
            /* Precise match for Deep Navy / Vibrant Cyan */
            --bg-gradient: radial-gradient(circle at center, #0a1329 0%, #020617 100%);
            --card-bg: rgba(8, 14, 30, 0.95);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #0ea5e9;
            --blur: 60px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            
            --menu-bg: rgba(2, 6, 23, 0.95);
            --menu-border: rgba(255, 255, 255, 0.05);

            --window-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            --window-shadow-active: 0 50px 100px rgba(0, 0, 0, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow: hidden;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            user-select: none;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
        }

        .text-main { color: var(--text-main); }
        .text-secondary { color: var(--text-secondary); }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur)) saturate(160%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: background 0.5s ease, border 0.5s ease;
        }

        .menu-bar-glass {
            background: var(--menu-bg);
            backdrop-filter: blur(45px) saturate(180%);
            -webkit-backdrop-filter: blur(45px) saturate(180%);
            border-bottom: 0.5px solid var(--menu-border);
            transition: background 0.5s ease, border 0.5s ease;
        }

        .window {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 0.5px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 14px;
            box-shadow: var(--window-shadow);
            transition: box-shadow 0.4s ease, background 0.5s ease, border 0.5s ease;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(150, 150, 150, 0.2);
            border-radius: 10px;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.15); }
        }
        .glow { animation: pulse-glow 15s infinite ease-in-out; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^12.4.7",
    "lucide-react": "https://esm.sh/lucide-react@^0.475.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
